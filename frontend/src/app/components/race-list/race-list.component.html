<div class="card">
  <div class="section-heading">
    <div>
      <h3>Painel de corridas</h3>
      <p>Selecione uma prova encerrada para gerar a análise.</p>
    </div>
    <span class="section-badge">OpenF1</span>
  </div>

  <div *ngIf="loading" class="list-status">Carregando corridas...</div>
  <div *ngIf="error" class="error-message">{{ error }}</div>

  <button
    *ngFor="let race of races"
    class="race-option"
    [class.active]="race.session_key === selectedSessionKey"
    (click)="selectRace(race)">
    <span class="race-option-top">
      <strong>{{ race.meeting_name }}</strong>
      <span class="race-year">{{ race.year }}</span>
    </span>
    <span class="race-option-bottom">{{ race.country_name }} • {{ race.circuit_short_name }}</span>
  </button>
</div>
