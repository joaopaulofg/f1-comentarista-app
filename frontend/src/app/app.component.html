<div class="page-shell">
  <section class="hero-panel">
    <h1 class="hero-title">
      <span>Seu comentarista inteligente da F1</span>
      <span class="hero-title-icon">🏎️</span>
    </h1>
  </section>

  <div class="main-grid">
    <app-race-list
      [selectedSessionKey]="selectedRace?.session_key"
      (raceSelected)="onRaceSelected($event)"></app-race-list>
    <app-race-commentary [race]="selectedRace"></app-race-commentary>
  </div>
</div>
